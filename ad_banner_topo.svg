<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 728 90" width="100%" height="100%">
  <!-- Fundo com Gradiente de Rosa Claro para Cinza Azulado Suave -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDF2F8"/>
      <stop offset="50%" stop-color="#FCE7F3"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
  </defs>
  <rect width="728" height="90" fill="url(#bgGrad)" rx="8"/>
  
  <!-- Detalhes Decorativos de Fundo -->
  <circle cx="80" cy="45" r="70" fill="#DB2777" opacity="0.03"/>
  <circle cx="650" cy="45" r="90" fill="#1E293B" opacity="0.02"/>

  <!-- Desenho Ilustrativo: Livro da Bíblia (Esquerda) -->
  <g transform="translate(40, 20)">
    <!-- Bíblia Aberta -->
    <path d="M40,50 C32,45 20,45 10,48 L10,18 C20,15 32,15 40,20 C48,15 60,15 70,18 L70,48 C60,45 48,45 40,50 Z" fill="#FFFFFF" stroke="#1E293B" stroke-width="2" stroke-linejoin="round"/>
    <path d="M40,20 L40,50" fill="none" stroke="#1E293B" stroke-width="1.5"/>
    <!-- Cruz da Capa -->
    <path d="M40,10 L40,25 M35,15 L45,15" fill="none" stroke="#DB2777" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Pomba voando em direção à Bíblia -->
    <path d="M30,35 C28,34 25,33 22,34 C20,35 18,37 19,39 C20,40 23,39 25,38" fill="none" stroke="#DB2777" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Texto Principal do Banner -->
  <text x="160" y="42" font-family="'Outfit', 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#1E293B">Espaço de Oração e Acolhimento</text>
  <text x="160" y="62" font-family="'Inter', 'Segoe UI', sans-serif" font-size="13" font-weight="500" fill="#64748B">Encontre paz com palavras de conforto bíblico</text>

  <!-- Selo "Anúncio AdSense" (Direita) -->
  <rect x="580" y="30" width="110" height="30" rx="15" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="635" y="49" font-family="'Inter', sans-serif" font-size="10" font-weight="700" fill="#DB2777" text-anchor="middle">AdSense V1.0</text>
</svg>
