<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 250" width="100%" height="100%">
  <!-- Fundo com Gradiente Rosa Suave -->
  <defs>
    <linearGradient id="sideGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FDF2F8"/>
      <stop offset="100%" stop-color="#FCE7F3"/>
    </linearGradient>
  </defs>
  <rect width="300" height="250" fill="url(#sideGrad)" rx="8" stroke="#F472B6" stroke-width="1"/>

  <!-- Desenho Ilustrativo: Cruz de Luz Estilizada -->
  <g transform="translate(150, 80)" text-anchor="middle">
    <!-- Auréola Circular Rosa -->
    <circle cx="0" cy="0" r="45" fill="#DB2777" opacity="0.05"/>
    <circle cx="0" cy="0" r="30" fill="#DB2777" opacity="0.08"/>
    <!-- Cruz Central -->
    <path d="M0,-35 L0,25 M-20,-15 L20,-15" fill="none" stroke="#DB2777" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Conteúdo de Texto -->
  <text x="150" y="165" font-family="'Outfit', sans-serif" font-size="16" font-weight="700" fill="#1E293B" text-anchor="middle">Palavra Diária de Alívio</text>
  <text x="150" y="185" font-family="'Inter', sans-serif" font-size="11" font-weight="500" fill="#64748B" text-anchor="middle">Acalme seus pensamentos e o coração</text>
  <text x="150" y="200" font-family="'Inter', sans-serif" font-size="11" font-weight="500" fill="#64748B" text-anchor="middle">hoje com a nossa IA devocional.</text>

  <!-- Tag de Anúncio -->
  <rect x="90" y="215" width="120" height="20" rx="10" fill="#1E293B" />
  <text x="150" y="228" font-family="'Inter', sans-serif" font-size="9" font-weight="700" fill="#FFFFFF" text-anchor="middle">ACESSE GRÁTIS</text>
</svg>
